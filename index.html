<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>汐止區強制拜訪地圖</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Noto Sans TC', sans-serif; display: flex; height: 100vh; }
#map { flex: 1; height: 100vh; }
#sidebar { width: 400px; overflow-y: auto; background: #f8f9fa; padding: 16px; }
h2 { font-size: 18px; margin-bottom: 12px; color: #333; }
.street-group { margin-bottom: 16px; }
.street-title { font-size: 14px; font-weight: 700; color: #1a73e8; padding: 4px 0; border-bottom: 1px solid #ddd; margin-bottom: 6px; }
.customer { padding: 6px 8px; margin: 3px 0; border-radius: 6px; background: white; cursor: pointer; transition: 0.2s; border-left: 3px solid #1a73e8; font-size: 13px; }
.customer:hover { background: #e8f0fe; }
.customer .name { font-weight: 600; color: #333; }
.customer .info { color: #666; font-size: 12px; margin-top: 2px; }
.customer .phone { color: #0d7c3f; }
.customer .no-phone { color: #999; }
.legend { padding: 6px 10px; background: white; border-radius: 8px; box-shadow: 0 1px 5px rgba(0,0,0,0.15); font-size: 13px; line-height: 1.6; }
.legend i { width: 12px; height: 12px; display: inline-block; border-radius: 50%; margin-right: 4px; }
</style>
</head>
<body>

<div id="sidebar">
  <h2>📍 汐止區強制拜訪未認養</h2>
  <p style="font-size:13px;color:#666;margin-bottom:12px;">點選客戶名稱可開啟 Google Maps 導航</p>
  <div id="customer-list"></div>
</div>

<div id="map"></div>

<script>
// 汐止各路段概略座標 (為了地圖標記)
const streetCoords = {
  '大同路一段': [25.0685, 121.6410],
  '大同路二段': [25.0685, 121.6540],
  '大同路三段': [25.0670, 121.6670],
  '新台五路一段': [25.0630, 121.6490],
  '新台五路二段': [25.0600, 121.6600],
  '康寧街': [25.0690, 121.6330],
  '福德一路': [25.0730, 121.6360],
  '福德二路': [25.0735, 121.6430],
  '南陽街': [25.0680, 121.6570],
  '保長路': [25.0730, 121.6680],
  '八連路一段': [25.0680, 121.6780],
  '中興路': [25.0700, 121.6380],
  '汐萬路': [25.0760, 121.6300],
};

function getStreet(addr) {
  for (const s of Object.keys(streetCoords)) {
    if (addr.includes(s)) return s;
  }
  // fallback: try to extract any road name
  const m = addr.match(/([\u4e00-\u9fff]+路[\u4e00-\u9fff\d]*段?)/);
  return m ? m[1] : null;
}

const customers = [
  { name: "和遠國際企業有限公司", phone: "02-86477272", contact: "洪?萱小姐", addr: "221新北市汐止區保長路35巷10號1樓" },
  { name: "鈞皓", phone: "電話待補", contact: "張鈞皓先生", addr: "221新北市汐止區八連路一段528號" },
  { name: "吉運", phone: "電話待補", contact: "周雪鈴小姐", addr: "221新北市汐止區南陽街120巷35號" },
  { name: "大象實業股份有限公司", phone: "02-26931113", contact: "黃淑芬", addr: "221新北市汐止區南陽街43號" },
  { name: "絲路", phone: "電話待補", contact: "廖聖琪小姐", addr: "221新北市汐止區大同路一段146巷15號" },
  { name: "新隆儲運股份有限公司", phone: "02-26413111", contact: "潘小姐", addr: "221新北市汐止區大同路一段201號" },
  { name: "瑞欣", phone: "電話待補", contact: "詹逸超先生", addr: "221新北市汐止區大同路一段306之3號9樓" },
  { name: "宏磊科技股份有限公司", phone: "02-86472345 0922-525760", contact: "方春梅小姐", addr: "221新北市汐止區大同路三段196之12號3樓" },
  { name: "詠泰", phone: "電話待補", contact: "鄭詠馨小姐", addr: "221新北市汐止區大同路三段369巷13號" },
  { name: "鼎燦", phone: "電話待補", contact: "黃曉琳小姐", addr: "221新北市汐止區康寧街169巷31號7樓之3" },
  { name: "順盈企業", phone: "電話待補", contact: "盧宥朋先生", addr: "221新北市汐止區康寧街61巷22弄5號1樓" },
  { name: "智友", phone: "電話待補", contact: "吳美玲小姐", addr: "221新北市汐止區新台五路一段104號8樓" },
  { name: "欣統", phone: "電話待補", contact: "蔡雲姑小姐", addr: "221新北市汐止區新台五路一段79號16樓之3" },
  { name: "麗茂", phone: "電話待補", contact: "賴珮齡小姐", addr: "221新北市汐止區新台五路一段95號18樓之6(C棟)" },
  { name: "騰雲", phone: "電話待補", contact: "朱訓儀", addr: "221新北市汐止區新台五路一段99號11樓之11" },
  { name: "碁崴", phone: "電話待補", contact: "林美珍小姐", addr: "221新北市汐止區福德一路430巷29號B1" },
];

// 依路名分組
const groups = {};
const streetOrder = [];
for (const c of customers) {
  const s = getStreet(c.addr) || '其他';
  if (!groups[s]) { groups[s] = []; streetOrder.push(s); }
  groups[s].push(c);
}

// 初始化地圖
const map = L.map('map').setView([25.070, 121.655], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap',
  maxZoom: 19
}).addTo(map);

// 道路顏色
const roadColors = {
  '大同路一段': '#e74c3c', '大同路三段': '#e74c3c',
  '新台五路一段': '#2ecc71',
  '康寧街': '#f39c12',
  '福德一路': '#9b59b6',
  '南陽街': '#1abc9c',
  '保長路': '#e67e22',
  '八連路一段': '#34495e',
};

// 加 marker + sidebar
const sidebar = document.getElementById('customer-list');
let html = '';

for (const s of streetOrder) {
  const color = roadColors[s] || '#1a73e8';
  const coord = streetCoords[s] || [25.070, 121.655];
  
  html += `<div class="street-group"><div class="street-title" style="color:${color}">🛣️ ${s}</div>`;
  
  for (const c of groups[s]) {
    // Google Maps 導航 URL
    const gmUrl = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(c.addr)}`;
    const telUrl = c.phone.includes('待補') ? '#' : `tel:${c.phone.replace(/[^0-9]/g,'')}`;
    const phoneClass = c.phone.includes('待補') ? 'no-phone' : 'phone';
    
    // 在地圖加 marker (加點隨機偏移避免重疊)
    const jitter = () => (Math.random() - 0.5) * 0.003;
    const marker = L.circleMarker([coord[0] + jitter(), coord[1] + jitter()], {
      radius: 8, color: color, fillColor: color, fillOpacity: 0.7, weight: 2
    }).addTo(map);
    marker.bindPopup(`<b>${c.name}</b><br>${c.contact}<br>${c.phone}<br><a href="${gmUrl}" target="_blank">🗺️ 導航</a>`);
    
    html += `<div class="customer" onclick="window.open('${gmUrl}','_blank')">
      <div class="name">${c.name}</div>
      <div class="info">${c.contact} · <span class="${phoneClass}">📞 ${c.phone}</span></div>
      <div class="info" style="color:#888;font-size:11px;">${c.addr}</div>
    </div>`;
  }
  html += '</div>';
}
sidebar.innerHTML = html;

// 圖例
const legend = L.control({position: 'bottomleft'});
legend.onAdd = function() {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = '<b>🛣️ 路段</b><br>';
  for (const [s, color] of Object.entries(roadColors)) {
    if (groups[s]) div.innerHTML += `<i style="background:${color}"></i> ${s}<br>`;
  }
  return div;
};
legend.addTo(map);
</script>
</body>
</html>
