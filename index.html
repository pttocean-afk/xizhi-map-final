<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>汐止區強制拜訪地圖</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Noto Sans TC', sans-serif; display: flex; height: 100vh; flex-direction: column; }
#map { flex: 1; height: 100vh; }
#sidebar { width: 100%; max-height: 45vh; overflow-y: auto; background: #f8f9fa; padding: 12px 16px; border-top: 2px solid #1a73e8; }
h2 { font-size: 18px; margin-bottom: 8px; color: #333; }
.street-group { margin-bottom: 12px; }
.street-title { font-size: 14px; font-weight: 700; color: #1a73e8; padding: 4px 0; border-bottom: 1px solid #ddd; margin-bottom: 6px; }
.customer { padding: 6px 8px; margin: 3px 0; border-radius: 6px; background: white; cursor: pointer; transition: 0.2s; border-left: 3px solid #1a73e8; font-size: 13px; }
.customer:hover { background: #e8f0fe; }
.customer .name { font-weight: 600; color: #333; }
.customer .info { color: #666; font-size: 12px; margin-top: 2px; }
.customer .phone { color: #0d7c3f; }
.customer .no-phone { color: #999; }
.customer .dist { color: #e67e22; font-size: 11px; }
.legend { padding: 6px 10px; background: white; border-radius: 8px; box-shadow: 0 1px 5px rgba(0,0,0,0.15); font-size: 13px; line-height: 1.6; }
.legend i { width: 12px; height: 12px; display: inline-block; border-radius: 50%; margin-right: 4px; }
.locate-btn {
  background: white; border: 2px solid #1a73e8; border-radius: 8px;
  padding: 8px 14px; font-size: 14px; font-weight: 600; color: #1a73e8;
  cursor: pointer; box-shadow: 0 1px 5px rgba(0,0,0,0.2);
  margin-bottom: 8px; display: inline-block;
}
.locate-btn:hover { background: #e8f0fe; }
.locate-btn.active { background: #1a73e8; color: white; }
#toolbar { padding: 8px 16px 0; background: #f8f9fa; text-align: center; }
@media (min-width: 768px) {
  body { flex-direction: row; }
  #sidebar { width: 380px; max-height: 100vh; border-top: none; border-left: 2px solid #1a73e8; }
  #toolbar { padding: 12px 16px; text-align: left; }
}
</style>
</head>
<body>

<div id="map"></div>

<div style="display:flex;flex-direction:column;">
<div id="toolbar">
  <button class="locate-btn" id="locateBtn" onclick="locateMe()">📍 顯示我的位置</button>
</div>
<div id="sidebar">
  <h2>📍 汐止區強制拜訪未認養</h2>
  <p style="font-size:13px;color:#666;margin-bottom:8px;">點選客戶名稱可開啟 Google Maps 導航</p>
  <div id="customer-list"></div>
</div>
</div>

<script>
// 汐止各路段概略座標 (為了地圖標記)
const streetCoords = {
  '大同路一段': [25.0685, 121.6410],
  '大同路二段': [25.0685, 121.6540],
  '大同路三段': [25.0670, 121.6670],
  '新台五路一段': [25.0630, 121.6490],
  '新台五路二段': [25.0600, 121.6600],
  '康寧街': [25.0690, 121.6330],
  '福德一路': [25.0730, 121.6360],
  '福德二路': [25.0735, 121.6430],
  '南陽街': [25.0680, 121.6570],
  '保長路': [25.0730, 121.6680],
  '八連路一段': [25.0680, 121.6780],
  '中興路': [25.0700, 121.6380],
  '汐萬路': [25.0760, 121.6300],
};

function getStreet(addr) {
  for (const s of Object.keys(streetCoords)) {
    if (addr.includes(s)) return s;
  }
  const m = addr.match(/([\u4e00-\u9fff]+路[\u4e00-\u9fff\d]*段?)/);
  return m ? m[1] : null;
}

const customers = [
  { name: "和遠國際企業有限公司", phone: "02-86477272", contact: "洪?萱小姐", addr: "221新北市汐止區保長路35巷10號1樓" },
  { name: "鈞皓", phone: "電話待補", contact: "張鈞皓先生", addr: "221新北市汐止區八連路一段528號" },
  { name: "吉運", phone: "電話待補", contact: "周雪鈴小姐", addr: "221新北市汐止區南陽街120巷35號" },
  { name: "大象實業股份有限公司", phone: "02-26931113", contact: "黃淑芬", addr: "221新北市汐止區南陽街43號" },
  { name: "絲路", phone: "電話待補", contact: "廖聖琪小姐", addr: "221新北市汐止區大同路一段146巷15號" },
  { name: "新隆儲運股份有限公司", phone: "02-26413111", contact: "潘小姐", addr: "221新北市汐止區大同路一段201號" },
  { name: "瑞欣", phone: "電話待補", contact: "詹逸超先生", addr: "221新北市汐止區大同路一段306之3號9樓" },
  { name: "宏磊科技股份有限公司", phone: "02-86472345 0922-525760", contact: "方春梅小姐", addr: "221新北市汐止區大同路三段196之12號3樓" },
  { name: "詠泰", phone: "電話待補", contact: "鄭詠馨小姐", addr: "221新北市汐止區大同路三段369巷13號" },
  { name: "鼎燦", phone: "電話待補", contact: "黃曉琳小姐", addr: "221新北市汐止區康寧街169巷31號7樓之3" },
  { name: "順盈企業", phone: "電話待補", contact: "盧宥朋先生", addr: "221新北市汐止區康寧街61巷22弄5號1樓" },
  { name: "智友", phone: "電話待補", contact: "吳美玲小姐", addr: "221新北市汐止區新台五路一段104號8樓" },
  { name: "欣統", phone: "電話待補", contact: "蔡雲姑小姐", addr: "221新北市汐止區新台五路一段79號16樓之3" },
  { name: "麗茂", phone: "電話待補", contact: "賴珮齡小姐", addr: "221新北市汐止區新台五路一段95號18樓之6(C棟)" },
  { name: "騰雲", phone: "電話待補", contact: "朱訓儀", addr: "221新北市汐止區新台五路一段99號11樓之11" },
  { name: "碁崴", phone: "電話待補", contact: "林美珍小姐", addr: "221新北市汐止區福德一路430巷29號B1" },
];

let userMarker = null;
let userLocation = null; // [lat, lng]
const customerMarkers = [];

// 計算兩點距離 (Haversine, 回傳公里)
function calcDistance(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function formatDist(km) {
  if (km < 1) return `${Math.round(km * 1000)}m`;
  return `${km.toFixed(1)}km`;
}

// 依路名分組
const groups = {};
const streetOrder = [];
for (const c of customers) {
  const s = getStreet(c.addr) || '其他';
  if (!groups[s]) { groups[s] = []; streetOrder.push(s); }
  groups[s].push(c);
}

// 初始化地圖
const map = L.map('map', { zoomControl: true }).setView([25.070, 121.655], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap',
  maxZoom: 19
}).addTo(map);

const roadColors = {
  '大同路一段': '#e74c3c', '大同路三段': '#e74c3c',
  '新台五路一段': '#2ecc71',
  '康寧街': '#f39c12',
  '福德一路': '#9b59b6',
  '南陽街': '#1abc9c',
  '保長路': '#e67e22',
  '八連路一段': '#34495e',
};

// 加 marker + sidebar
const sidebar = document.getElementById('customer-list');

function renderSidebar() {
  let html = '';
  for (const s of streetOrder) {
    const color = roadColors[s] || '#1a73e8';
    html += `<div class="street-group"><div class="street-title" style="color:${color}">🛣️ ${s}</div>`;
    for (const c of groups[s]) {
      const gmUrl = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(c.addr)}`;
      const phoneClass = c.phone.includes('待補') ? 'no-phone' : 'phone';
      let distHtml = '';
      if (userLocation && c._coord) {
        const d = calcDistance(userLocation[0], userLocation[1], c._coord[0], c._coord[1]);
        distHtml = ` · <span class="dist">📏 ${formatDist(d)}</span>`;
      }
      html += `<div class="customer" onclick="window.open('${gmUrl}','_blank')">
        <div class="name">${c.name}</div>
        <div class="info">${c.contact} · <span class="${phoneClass}">📞 ${c.phone}</span>${distHtml}</div>
        <div class="info" style="color:#888;font-size:11px;">${c.addr}</div>
      </div>`;
    }
    html += '</div>';
  }
  sidebar.innerHTML = html;
}

// 建立所有客戶 marker，存 coord 供距離計算
for (const s of streetOrder) {
  const color = roadColors[s] || '#1a73e8';
  const coord = streetCoords[s] || [25.070, 121.655];
  for (const c of groups[s]) {
    const jitter = () => (Math.random() - 0.5) * 0.003;
    const lat = coord[0] + jitter();
    const lng = coord[1] + jitter();
    c._coord = [lat, lng];
    const gmUrl = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(c.addr)}`;
    const marker = L.circleMarker([lat, lng], {
      radius: 8, color: color, fillColor: color, fillOpacity: 0.7, weight: 2
    }).addTo(map);
    marker.bindPopup(`<b>${c.name}</b><br>${c.contact}<br>${c.phone}<br><a href="${gmUrl}" target="_blank">🗺️ 導航</a>`);
    customerMarkers.push(marker);
  }
}

renderSidebar();

// 定位功能
function locateMe() {
  const btn = document.getElementById('locateBtn');
  if (userMarker) {
    // 已經定位過，再按一下飛到使用者位置
    map.setView(userLocation, 14);
    return;
  }
  btn.textContent = '📍 定位中...';
  btn.disabled = true;
  
  map.locate({ setView: false, enableHighAccuracy: true, timeout: 15000 });
  
  map.once('locationfound', function(e) {
    userLocation = [e.latitude, e.longitude];
    
    // 使用者位置藍色圓點
    userMarker = L.circleMarker(userLocation, {
      radius: 12,
      color: '#1a73e8',
      fillColor: '#4285f4',
      fillOpacity: 0.8,
      weight: 3
    }).addTo(map);
    userMarker.bindPopup('<b>📍 你的位置</b>');
    
    // 地圖移到使用者位置，顯示周邊
    map.setView(userLocation, 14);
    
    // 畫一個半徑 1km 的圈圈表示步行可達範圍
    L.circle(userLocation, {
      radius: 1000,
      color: '#4285f4',
      fillColor: '#4285f4',
      fillOpacity: 0.08,
      weight: 1,
      dashArray: '5, 5'
    }).addTo(map);
    
    btn.textContent = '📍 我的位置';
    btn.classList.add('active');
    btn.disabled = false;
    
    // 重新渲染 sidebar 加上距離
    renderSidebar();
    
    // 按距離排序的建議
    const withDist = [];
    for (const s of streetOrder) {
      for (const c of groups[s]) {
        const d = calcDistance(userLocation[0], userLocation[1], c._coord[0], c._coord[1]);
        withDist.push({ ...c, dist: d, street: s });
      }
    }
    withDist.sort((a, b) => a.dist - b.dist);
    
    // 最近的 3 家
    let nearHtml = '<div style="background:#e8f5e9;padding:8px 10px;border-radius:8px;margin-bottom:10px;font-size:13px;">';
    nearHtml += '<b>🚶 離你最近</b><br>';
    for (let i = 0; i < Math.min(3, withDist.length); i++) {
      const c = withDist[i];
      const gmUrl = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(c.addr)}`;
      nearHtml += `${i+1}. <a href="${gmUrl}" target="_blank" style="color:#2e7d32;text-decoration:none;font-weight:600;">${c.name}</a> (${formatDist(c.dist)})<br>`;
    }
    nearHtml += '</div>';
    sidebar.innerHTML = nearHtml + sidebar.innerHTML;
  });
  
  map.once('locationerror', function(e) {
    alert('無法取得你的位置：' + (e.message || '請確認已允許取用位置資訊'));
    btn.textContent = '📍 顯示我的位置';
    btn.disabled = false;
  });
}

// 圖例
const legend = L.control({position: 'bottomleft'});
legend.onAdd = function() {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = '<b>🛣️ 路段</b><br>';
  for (const [s, color] of Object.entries(roadColors)) {
    if (groups[s]) div.innerHTML += `<i style="background:${color}"></i> ${s}<br>`;
  }
  return div;
};
legend.addTo(map);
</script>
</body>
</html>
